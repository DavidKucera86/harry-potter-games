<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; connect-src 'self' https://hp-api.onrender.com; style-src 'self'; script-src 'self'; base-uri 'self'; form-action 'self';">
  <title>Hádej zaklínadlo — Harry Potter Games</title>
  <link rel="stylesheet" href="../shared/common.css">
  <link rel="stylesheet" href="../shared/styles/hangman.css">
</head>
<body>
  <header>
    <a class="back-link" href="../index.html">← Zpět na menu</a>
    <h1>Hádej zaklínadlo</h1>
    <p>Uhodni zaklínadlo písmeno po písmenu. Máš 10 životů.</p>
  </header>

  <div class="game-container" aria-busy="false">
    <div class="loading-overlay" id="loadingOverlay" hidden>
      <div class="spinner" role="status" aria-label="Načítám data"></div>
      <p>Načítám data…</p>
    </div>

    <div class="status-bar">
      <div class="lives">
        <span class="lives-label">Životy</span>
        <div class="hearts" id="hearts" role="img"></div>
      </div>
      <div>
        <span class="score-label">Skóre </span>
        <span class="score" id="score">0</span>
      </div>
      <div class="wrong-letters">
        Špatně: <span id="wrongLetters">—</span>
      </div>
    </div>

    <div class="word-display" id="wordDisplay" role="group" aria-label="Hádané slovo"></div>

    <div class="message info" id="message" aria-live="polite">Hádej písmeno v zaklínadle…</div>

    <div class="input-area">
      <input
        type="text"
        id="letterInput"
        maxlength="1"
        placeholder="Zadej písmeno"
        autocomplete="off"
        autofocus
        aria-label="Zadej písmeno"
      >
      <button class="btn btn-primary" id="guessBtn">Hádat</button>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="newGameBtn">Nová hra</button>
    </div>

    <p class="keyboard-hint">Tip: můžeš psát přímo na klávesnici a potvrdit Enterem</p>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true" inert>
    <div class="modal">
      <div class="modal-icon" id="modalIcon" aria-hidden="true"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="btn btn-primary" id="modalBtn">Hrát znovu</button>
    </div>
  </div>

  <footer class="site-footer">
    <p>Líbí se ti hry? Pošli autorovi kouzelný nápoj</p>
    <a class="bmc-link" href="https://buymeacoffee.com/dvdkcrb" target="_blank" rel="noopener noreferrer">
      ☕ Buy Me a Coffee
    </a>
  </footer>

  <script type="module" src="script.js"></script>
</body>
</html>
