<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hádej postavu — Harry Potter Games</title>
  <link rel="stylesheet" href="../shared/common.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a class="back-link" href="../index.html">← Zpět na menu</a>
    <h1>Hádej postavu z Harryho Pottera</h1>
    <p>Uhodni jméno postavy písmeno po písmenu. Máš 10 životů.</p>
  </header>

  <div class="game-container">
    <div class="status-bar">
      <div class="lives">
        <span class="lives-label">Životy</span>
        <div class="hearts" id="hearts"></div>
      </div>
      <div class="wrong-letters">
        Špatně: <span id="wrongLetters">—</span>
      </div>
    </div>

    <div class="word-display" id="wordDisplay"></div>

    <div class="message info" id="message">Hádej písmeno ve jménu postavy…</div>

    <div class="input-area">
      <input
        type="text"
        id="letterInput"
        maxlength="1"
        placeholder="Zadej písmeno"
        autocomplete="off"
        autofocus
      >
      <button class="btn btn-primary" id="guessBtn">Hádat</button>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="newGameBtn">Nová hra</button>
    </div>

    <p class="keyboard-hint">Tip: můžeš psát přímo na klávesnici a potvrdit Enterem</p>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-icon" id="modalIcon"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="btn btn-primary" id="modalBtn">Hrát znovu</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
