server {
    listen 4173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the PWA manifest with the correct content type.
    location ~* \.webmanifest$ {
        default_type application/manifest+json;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Mirror the production security headers defined in netlify.toml.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; connect-src 'self' https://hp-api.onrender.com; style-src 'self'; script-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
