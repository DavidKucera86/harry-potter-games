<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; connect-src 'self' https://hp-api.onrender.com; style-src 'self'; script-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
  <meta name="theme-color" content="#1a1025">
  <meta name="description" content="Kvíz z Bradavic: ke jménu postavy z Harryho Pottera vyber správnou kolej ze čtyř možností. Máš 10 životů.">
  <link rel="canonical" href="https://harry-potter-games.netlify.app/guess-house/">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/shared/icons/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Harry Potter Games">
  <meta property="og:title" content="Hádej kolej — Harry Potter Games">
  <meta property="og:description" content="Kvíz z Bradavic: ke jménu postavy z Harryho Pottera vyber správnou kolej ze čtyř možností. Máš 10 životů.">
  <meta property="og:url" content="https://harry-potter-games.netlify.app/guess-house/">
  <meta property="og:image" content="https://harry-potter-games.netlify.app/shared/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hádej kolej — Harry Potter Games">
  <meta name="twitter:description" content="Kvíz z Bradavic: ke jménu postavy z Harryho Pottera vyber správnou kolej ze čtyř možností. Máš 10 životů.">
  <meta name="twitter:image" content="https://harry-potter-games.netlify.app/shared/og-image.png">
  <title>Hádej kolej — Harry Potter Games</title>
  <link rel="stylesheet" href="../shared/common.css">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n-ui="skipToContent">Přeskočit na obsah</a>
  <div id="swUpdateBanner" class="sw-update-banner" role="status" aria-live="polite" hidden>
    <p id="swUpdateMessage" data-i18n-ui="swUpdateMessage">Je dostupná nová verze.</p>
    <button type="button" id="swUpdateReloadBtn" class="btn btn-primary" data-i18n-ui="swUpdateReload" data-i18n-ui-aria-label="swUpdateReload">Obnovit</button>
  </div>
  <main id="main-content">
  <header>
    <a class="back-link" href="../index.html" data-i18n-ui="backToMenu">← Zpět na menu</a>
    <h1 data-i18n-key="quizHouseTitle">Hádej kolej postavy</h1>
    <p data-i18n-key="quizHouseDesc">Ke jménu postavy vyber správnou Bradavickou kolej.</p>
  </header>

  <div class="game-container" aria-busy="false">
    <div class="loading-overlay" id="loadingOverlay" hidden>
      <div class="spinner" role="status" data-i18n-a11y-label="loadingBusy" aria-label="Načítám data"></div>
      <p data-i18n-ui="loadingDefault">Načítám data…</p>
    </div>

    <div class="status-bar">
      <div class="lives">
        <span class="lives-label" data-i18n-ui="livesLabel">Životy</span>
        <div class="hearts" id="hearts" role="img"></div>
      </div>
      <div>
        <span class="score-label" data-i18n-ui="scoreLabel">Skóre </span>
        <span class="score" id="score">0</span>
      </div>
    </div>

    <div class="quiz-prompt" id="characterName"></div>

    <div class="message info" id="message" aria-live="polite" data-i18n-key="quizHouseInitial">Vyber kolej, do které postava patří…</div>

    <div class="choices-grid" id="choices"></div>

    <div class="actions">
      <button class="btn btn-secondary" id="newGameBtn" data-i18n-ui="newGame">Nová hra</button>
    </div>
  </div>
  </main>
  <div class="overlay" id="overlay" aria-hidden="true" inert>
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
      <div class="modal-icon" id="modalIcon" aria-hidden="true"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="btn btn-primary" id="modalBtn" data-i18n-ui="playAgain">Hrát znovu</button>
    </div>
  </div>
  <footer class="site-footer">
    <div class="locale-switcher">
      <label for="localeSelect" data-i18n-ui="localeLabel">Jazyk</label>
      <select id="localeSelect" aria-label="Language">
        <option value="cs">Čeština</option>
        <option value="en">English</option>
      </select>
    </div>
    <p data-i18n-ui="footerText">Líbí se ti hry? Pošli autorovi kouzelný nápoj</p>
    <a class="bmc-link" href="https://buymeacoffee.com/dvdkcrb" target="_blank" rel="noopener noreferrer" data-i18n-ui="buyMeCoffee">
      ☕ Buy Me a Coffee
    </a>
  </footer>
  <script type="module" src="../shared/initLocale.js"></script>

  <script type="module" src="script.js"></script>
</body>
</html>
