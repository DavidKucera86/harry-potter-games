<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; connect-src 'self' https://hp-api.onrender.com; style-src 'self'; script-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
  <meta name="theme-color" content="#1a1025">
  <meta name="description" content="Popovídej si s postavou ze světa Harryho Pottera. Zadej přezdívku, vyber postavu a dej se do řeči (zatím Brumbál).">
  <link rel="canonical" href="https://harry-potter-games.netlify.app/chat-with-character/">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/shared/icons/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Harry Potter Games">
  <meta property="og:title" content="Chat s postavou — Harry Potter Games">
  <meta property="og:description" content="Popovídej si s postavou ze světa Harryho Pottera. Zadej přezdívku, vyber postavu a dej se do řeči (zatím Brumbál).">
  <meta property="og:url" content="https://harry-potter-games.netlify.app/chat-with-character/">
  <meta property="og:image" content="https://harry-potter-games.netlify.app/shared/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Chat s postavou — Harry Potter Games">
  <meta name="twitter:description" content="Popovídej si s postavou ze světa Harryho Pottera. Zadej přezdívku, vyber postavu a dej se do řeči (zatím Brumbál).">
  <meta name="twitter:image" content="https://harry-potter-games.netlify.app/shared/og-image.png">
  <title>Chat s postavou — Harry Potter Games</title>
  <link rel="stylesheet" href="../shared/common.css">
  <link rel="stylesheet" href="../shared/styles/chat.css">
</head>
<body>
  <a href="#main-content" class="skip-link" data-i18n-ui="skipToContent">Přeskočit na obsah</a>
  <div id="swUpdateBanner" class="sw-update-banner" role="status" aria-live="polite" hidden>
    <p id="swUpdateMessage" data-i18n-ui="swUpdateMessage">Je dostupná nová verze.</p>
    <button type="button" id="swUpdateReloadBtn" class="btn btn-primary" data-i18n-ui="swUpdateReload" data-i18n-ui-aria-label="swUpdateReload">Obnovit</button>
  </div>
  <main id="main-content">
  <header>
    <a class="back-link" href="../index.html" data-i18n-ui="backToMenu">← Zpět na menu</a>
    <h1 data-i18n-key="chatTitle">Chat s postavou z Harryho Pottera</h1>
    <p data-i18n-key="chatDesc">Vyber si postavu a dej se s ní do řeči. Odpovídá připravenými hláškami podle toho, o čem píšeš.</p>
  </header>

  <div class="game-container" aria-busy="false">
    <div class="loading-overlay" id="loadingOverlay" hidden>
      <div class="spinner" role="status" data-i18n-a11y-label="loadingBusy" aria-label="Načítám data"></div>
      <p data-i18n-ui="loadingDefault">Načítám data…</p>
    </div>


    <section class="chat-setup" id="chatSetup" aria-labelledby="chatSetupHeading">
      <h2 id="chatSetupHeading" data-i18n-key="chatSetupHeading">Než začneme</h2>
      <form id="setupForm" novalidate>
        <div class="chat-field">
          <label for="nickname" data-i18n-key="chatNicknameLabel">Tvá přezdívka</label>
          <input type="text" id="nickname" name="nickname" maxlength="32" required
            autocomplete="off" spellcheck="false"
            data-i18n-ui-placeholder="chatNicknamePlaceholder"
            placeholder="Zadej přezdívku (max. 32 znaků)">
        </div>
        <div class="chat-field">
          <label for="characterSelect" data-i18n-key="chatCharacterLabel">S kým si chceš povídat?</label>
          <select id="characterSelect" name="character"></select>
        </div>
        <p class="message error" id="setupError" role="alert" aria-live="assertive" hidden></p>
        <button type="submit" class="btn btn-primary" id="startChatBtn" data-i18n-ui="chatStart">Začít chat</button>
      </form>
    </section>

    <section class="chat-room" id="chatRoom" hidden aria-labelledby="partnerName">
      <div class="chat-partner">
        <span class="chat-avatar" aria-hidden="true">🧙</span>
        <span class="chat-partner-info">
          <span class="chat-partner-name" id="partnerName"></span>
          <span class="chat-partner-title" id="partnerTitle"></span>
        </span>
      </div>

      <div class="chat-log" id="chatLog" role="log" aria-live="polite"
        data-i18n-ui-aria-label="chatLogLabel"></div>

      <form class="chat-input" id="chatForm">
        <input type="text" id="messageInput" name="message" maxlength="500"
          autocomplete="off"
          data-i18n-ui-placeholder="chatMessagePlaceholder"
          data-i18n-ui-aria-label="chatMessagePlaceholder"
          placeholder="Napiš zprávu…">
        <button type="submit" class="btn btn-primary" id="sendBtn" data-i18n-ui="chatSend">Odeslat</button>
      </form>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="backToSetupBtn" data-i18n-ui="chatBack">← Změnit postavu</button>
      </div>
    </section>
  </div>
  </main>
  <footer class="site-footer">
    <div class="locale-switcher">
      <label for="localeSelect" data-i18n-ui="localeLabel">Jazyk</label>
      <select id="localeSelect" aria-label="Language">
        <option value="cs">Čeština</option>
        <option value="en">English</option>
      </select>
    </div>
    <p data-i18n-ui="footerText">Líbí se ti hry? Pošli autorovi kouzelný nápoj</p>
    <a class="bmc-link" href="https://buymeacoffee.com/dvdkcrb" target="_blank" rel="noopener noreferrer" data-i18n-ui="buyMeCoffee">
      ☕ Buy Me a Coffee
    </a>
  </footer>
  <script type="module" src="../shared/initLocale.js"></script>

  <script type="module" src="script.js"></script>
</body>
</html>
