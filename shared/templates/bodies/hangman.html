  <main id="main-content">
  <header>
    <a class="back-link" href="../index.html" data-i18n-ui="backToMenu">← Zpět na menu</a>
    <h1 data-i18n-key="{{H1_KEY}}">{{H1}}</h1>
    <p data-i18n-key="{{HEADER_DESC_KEY}}">{{HEADER_DESC}}</p>
  </header>

  <div class="game-container" aria-busy="false">
{{LOADING_OVERLAY}}
{{STATUS_BAR_HANGMAN}}
    <div class="word-display" id="wordDisplay" role="group" data-i18n-a11y-label="wordDisplayLabel" aria-label="Hádané slovo"></div>

    <div class="message info" id="message" aria-live="polite" data-i18n-key="{{INITIAL_MESSAGE_KEY}}">{{INITIAL_MESSAGE}}</div>

    <div class="input-area">
      <input
        type="text"
        id="letterInput"
        maxlength="1"
        data-i18n-ui-placeholder="letterPlaceholder"
        placeholder="Zadej písmeno"
        autocomplete="off"
        inputmode="text"
        enterkeyhint="done"
        data-i18n-ui-aria-label="letterPlaceholder"
        aria-label="Zadej písmeno"
      >
      <button class="btn btn-primary" id="guessBtn" data-i18n-ui="guessLetter">Hádat</button>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="newGameBtn" data-i18n-ui="newGame">Nová hra</button>
    </div>

    <p class="keyboard-hint" data-i18n-ui="keyboardHint">Tip: můžeš psát přímo na klávesnici a potvrdit Enterem</p>
  </div>
  </main>
