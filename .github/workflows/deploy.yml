name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre_deploy_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      # Make apt resilient to flaky Ubuntu mirrors: bounded timeouts + retries +
      # IPv4 so a bad mirror fails fast instead of hanging the job. (PR #13 stalled
      # ~1h on azure.archive.ubuntu.com during `playwright install --with-deps`.)
      - name: Harden apt against flaky mirrors
        run: |
          sudo tee /etc/apt/apt.conf.d/99-ci-resilience >/dev/null <<'CONF'
          Acquire::Retries "3";
          Acquire::http::Timeout "30";
          Acquire::https::Timeout "30";
          Acquire::ForceIPv4 "true";
          CONF
      - run: npx playwright install chromium --with-deps
      - run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fonts-liberation
      - run: npm run verify:build
      - run: npm run typecheck
      - run: npm test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-pre-deploy
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy:
    needs: pre_deploy_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npx --yes netlify-cli@20.0.0 deploy --prod --dir=. --message="Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  post_deploy_tests:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      # Same apt hardening as pre_deploy_tests (see the comment there).
      - name: Harden apt against flaky mirrors
        run: |
          sudo tee /etc/apt/apt.conf.d/99-ci-resilience >/dev/null <<'CONF'
          Acquire::Retries "3";
          Acquire::http::Timeout "30";
          Acquire::https::Timeout "30";
          Acquire::ForceIPv4 "true";
          CONF
      - run: npx playwright install chromium --with-deps
      - run: PLAYWRIGHT_TARGET=production PLAYWRIGHT_BASE_URL=${{ secrets.NETLIFY_SITE_URL }} npx playwright test tests/smoke/menu.spec.ts --workers=1
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-post-deploy
          path: |
            playwright-report/
            test-results/
          retention-days: 14
